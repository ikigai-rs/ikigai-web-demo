[package]
name = "ikigai-web-demo"
version = "0.0.0"
edition = "2021"
publish = false
description = "Bootstrap: the ikigai kernel running in the browser via WebAssembly."

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Published crates from crates.io (graduated off the sibling path deps once
# ikigai-core/ikigai-vocab were published at 0.1.0). This demo is a standalone
# proof, intentionally not part of either repo's CI.
ikigai-core = "0.1.5"  # builtins::compose
ikigai-vocab = "0.1"
# The CLI's renderer-agnostic Engine — drives the in-page terminal. Pulls
# ikigai-resolve transitively for `impl Resolver for Kernel`. Published, so a
# fresh checkout (and the Pages CI) builds standalone.
ikigai-engine = "0.1"
serde_json = "1"  # encode the eval result ({kind, text, cache}) for JS
async-trait = "0.1"
wasm-bindgen = "=0.2.108"
wasm-bindgen-futures = "0.4"
console_error_panic_hook = "0.1"

[profile.release]
opt-level = "z"
lto = true
