[package]
name = "ikigai-web-demo"
version = "0.0.0"
edition = "2021"
publish = false
description = "Bootstrap: the ikigai kernel running in the browser via WebAssembly."

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Published crates from crates.io (graduated off the sibling path deps once
# ikigai-core/ikigai-vocab were published at 0.1.0). This demo is a standalone
# proof, intentionally not part of either repo's CI.
ikigai-core = "0.1.5"  # builtins::compose
ikigai-vocab = "0.1"
# Prototype (increment 2): reuse the CLI's renderer-agnostic Engine in the browser.
# Path-deps to the sibling ikigai-cli checkout while we prove it out; the publish-vs-path
# decision comes after it runs.
ikigai-engine = { path = "../ikigai-cli/crates/ikigai-engine" }
transport-core = { path = "../ikigai-cli/crates/transport-core" }
transport-embedded = { path = "../ikigai-cli/crates/transport-embedded" }
serde_json = "1"  # encode the eval result ({kind, text, cache}) for JS
async-trait = "0.1"
wasm-bindgen = "=0.2.108"
wasm-bindgen-futures = "0.4"
console_error_panic_hook = "0.1"

[profile.release]
opt-level = "z"
lto = true
