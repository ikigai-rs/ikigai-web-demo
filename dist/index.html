<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A page assembled by ikigai</title>
<style>
  html { background: #fff; }
  body { font: 17px/1.7 -apple-system, system-ui, sans-serif; max-width: 860px; margin: 44px auto; padding: 0 22px; color: #1a1a1a; background: #fff; }
  h1 { color: #1f7199; font-size: 28px; margin-bottom: 2px; }
  .sub { color: #555; margin-top: 0; }
  article { border: 1px solid #dfe2e5; border-radius: 10px; padding: 4px 18px 16px; margin: 18px 0; }
  code { color: #7a3e9d; font: 14px ui-monospace, Menlo, monospace; }
  b { background: #eef7ee; border-radius: 4px; padding: 0 4px; font-weight: 600; }
  h3 { font-size: 17px; color: #444; margin-top: 4px; }
  aside.about { border-left: 3px solid #1f7199; background: #f6f9fb; border-radius: 6px; padding: 2px 16px 12px; margin: 16px 0; }
  .literal { color: #555; }
  .literal b { background: none; padding: 0; }

  /* The in-page terminal — the CLI Engine running on this page's kernel. */
  .cli-mount { margin-top: 30px; }
  .cli-mount h3 { color: #1f7199; }
  ikigai-cli { display: block; background: #0f1419; border-radius: 10px; padding: 12px 14px; font: 13.5px/1.55 ui-monospace, Menlo, monospace; color: #d7dde3; }
  .cli-transcript { max-height: 320px; overflow-y: auto; }
  .cli-line { margin: 0; white-space: pre-wrap; word-break: break-word; font: inherit; }
  .cli-echo { color: #6cb6ff; }
  .cli-error { color: #ff8a8a; }
  .cli-help { color: #aab2bb; }
  .cli-cache { color: #65727f; font-style: italic; margin-bottom: 7px; }
  .cli-hint { color: #65727f; }
  .cli-inputline { display: flex; align-items: baseline; gap: 7px; margin-top: 5px; border-top: 1px solid #1f2730; padding-top: 8px; }
  .cli-prompt { color: #6cb6ff; }
  .cli-input { flex: 1; background: transparent; border: 0; outline: none; color: #d7dde3; font: inherit; padding: 0; }
  ikigai-cli code { color: #c39be8; }

  /* Interactive runbook — htmx HATEOAS tabs. Every tab/step is a urn:runbook:*
     resource; the markup below is all rendered by that resource, not authored here. */
  #runbook { margin-top: 30px; border: 1px solid #dfe2e5; border-radius: 10px; overflow: hidden; }
  .rb-tabs { display: flex; flex-wrap: wrap; background: #f3f6f9; border-bottom: 1px solid #dfe2e5; }
  .rb-tab { background: transparent; border: 0; border-bottom: 2px solid transparent; padding: 9px 16px; font: 14px system-ui, sans-serif; color: #1f7199; cursor: pointer; }
  .rb-tab:hover { background: #e7eef3; }
  .rb-tab.selected { background: #fff; border-bottom-color: #1f7199; font-weight: 600; }
  .rb-panel { padding: 14px 18px 18px; }
  .rb-intro { color: #444; }
  .rb-steps { list-style: none; padding: 0; }
  .rb-steps li { margin: 9px 0; }
  .rb-step { background: #f3f6f9; color: #1f7199; border: 1px solid #ccd6dd; border-radius: 6px; padding: 4px 10px; font: 12.5px ui-monospace, Menlo, monospace; cursor: pointer; }
  .rb-step:hover { background: #e7eef3; border-color: #1f7199; }
  .rb-cmd { color: #7a3e9d; font: 12px ui-monospace, Menlo, monospace; margin-left: 8px; }
  .rb-note { color: #777; font-size: 12.5px; margin-left: 8px; }
  .rb-out { background: #0f1419; color: #d7dde3; border-radius: 8px; padding: 10px 12px; margin-top: 12px; min-height: 1.4em; white-space: pre-wrap; font: 13px ui-monospace, Menlo, monospace; }
  .rb-outbar { display: flex; justify-content: flex-end; margin-top: 12px; }
  .rb-clear { background: transparent; color: #777; border: 1px solid #ccd6dd; border-radius: 6px; padding: 3px 10px; font: 12px system-ui, sans-serif; cursor: pointer; }
  .rb-clear:hover { background: #f3f6f9; color: #1f7199; border-color: #1f7199; }
  /* An inline button styled as a link — cross-links from the runbook tab to a page. */
  .rb-link { background: none; border: 0; padding: 0; color: #1f7199; font: inherit; cursor: pointer; text-decoration: underline; }
  .rb-link:hover { color: #155a7a; }

  /* Page toolbar — htmx nav between page resources (Home / Catalog / …). Each page
     carries the whole strip (HATEOAS); the active link is marked server-side. Wraps on
     narrow screens. */
  .ik-toolbar { display: flex; flex-wrap: wrap; gap: 4px; margin: 0 0 18px; border-bottom: 1px solid #dfe2e5; }
  .ik-nav { background: transparent; border: 0; border-bottom: 2px solid transparent; padding: 8px 14px; font: 14.5px system-ui, sans-serif; color: #1f7199; cursor: pointer; }
  .ik-nav:hover { background: #f3f6f9; }
  .ik-nav.selected { border-bottom-color: #1f7199; font-weight: 600; }

  /* Endpoint cards — the catalog RDF/XML styled by urn:xslt:transform. A responsive
     grid that collapses to one column on a phone. */
  .cards-pane { margin-top: 14px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .card { border: 1px solid #dfe2e5; border-radius: 10px; padding: 12px 14px; background: #fff; display: flex; flex-direction: column; gap: 7px; }
  .card:hover { border-color: #1f7199; box-shadow: 0 1px 6px rgba(31,113,153,0.08); }
  .card-head { display: flex; align-items: baseline; justify-content: space-between; gap: 6px 8px; flex-wrap: wrap; }
  .card-title { font-size: 15px; color: #1f7199; margin: 0; flex: 1 1 auto; min-width: 0; }
  .card-id { font: 11.5px ui-monospace, Menlo, monospace; color: #7a3e9d; background: #f6f2fb; border-radius: 4px; padding: 1px 6px; white-space: nowrap; }
  .card-summary { margin: 0; font-size: 13px; color: #444; line-height: 1.5; flex: 1; }
  .card-meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
  .card-verbs { display: flex; gap: 4px; flex-wrap: wrap; }
  .verb { font: 11px system-ui, sans-serif; color: #2e7d32; background: #eef7ee; border-radius: 4px; padding: 1px 7px; }
  .card-out { font: 11px ui-monospace, Menlo, monospace; color: #888; }
  /* Transreptor cards: a distinct kind badge + the from → to media-type matrix. */
  .card-kind { font: 11px system-ui, sans-serif; color: #a85b00; background: #fdf1e0; border: 1px solid #f0d3a8; border-radius: 4px; padding: 1px 7px; white-space: nowrap; }
  .card:has(.card-kind) { border-left: 3px solid #d98324; }
  .card-conv { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; font-size: 11px; }
  .conv-label { color: #a85b00; font: 600 10px system-ui, sans-serif; text-transform: uppercase; letter-spacing: .04em; }
  .conv-type { font: 11px ui-monospace, Menlo, monospace; color: #6a4a22; background: #fdf6ec; border-radius: 4px; padding: 1px 6px; }
  .conv-arrow { color: #d98324; font-weight: 600; margin: 0 2px; }

  /* Passkey identity — the sign-in/out affordance is rendered by urn:host:identity
     (composed into the top of the page); these styles dress it. */
  .ik-id { margin: 0 0 18px; padding: 8px 13px; background: #f6f9fb; border: 1px solid #dfe2e5; border-radius: 8px; font-size: 14px; color: #555; }
  .ik-id-in { background: #eef7ee; border-color: #cfe6cf; }
  .ik-id-link { color: #1f7199; cursor: pointer; text-decoration: none; font-weight: 600; }
  .ik-id-link:hover { text-decoration: underline; }
  .ik-id-hint { color: #888; font-size: 13px; }
  .ik-try { margin: -8px 0 18px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .ik-try .ik-try-label { color: #777; font-size: 13px; }
  .ik-try button { background: #f3f6f9; color: #1f7199; border: 1px solid #ccd6dd; border-radius: 6px; padding: 4px 10px; font: 12.5px ui-monospace, Menlo, monospace; cursor: pointer; }
  .ik-try button:hover { background: #e7eef3; border-color: #1f7199; }

  /* Control page — the scheduler + cache readouts, each a composed sub-request. */
  .ctl-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; margin-top: 16px; }
  .ctl-card { border: 1px solid #dfe2e5; border-radius: 10px; padding: 12px 16px 14px; background: #fff; border-left: 3px solid #1f7199; }
  .ctl-card-cache { border-left-color: #d98324; }
  .ctl-card-time { border-left-color: #2f9e44; }
  .ctl-title { font-size: 16px; color: #1f7199; margin: 0 0 2px; }
  .ctl-card-cache .ctl-title { color: #a85b00; }
  .ctl-card-time .ctl-title { color: #2b8a3e; }
  .ctl-note { color: #777; font-size: 12.5px; margin: 0 0 8px; }
  .ctl-readout { background: #0f1419; color: #d7dde3; border-radius: 8px; padding: 10px 12px; margin: 0; overflow-x: auto; white-space: pre; font: 13px/1.5 ui-monospace, Menlo, monospace; }
  /* "live" badge in the panel title — a steadily pulsing dot says the panel auto-refreshes. */
  .ctl-live { display: inline-flex; align-items: center; gap: 6px; vertical-align: middle; margin-left: 10px;
              font-size: 12px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: #2f9e44; }
  .ctl-live-dot { width: 8px; height: 8px; border-radius: 50%; background: #2f9e44; animation: ctl-pulse 1s ease-in-out infinite; }
  @keyframes ctl-pulse { 0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(47,158,68,.45); } 50% { opacity: .4; box-shadow: 0 0 0 5px rgba(47,158,68,0); } }
  /* Each poll re-renders #ctl-cards, so the readouts replay this on every tick — a faint
     sweep that makes the once-a-second refresh visible without being noisy. */
  .ctl-readout { animation: ctl-refresh .9s ease-out; }
  @keyframes ctl-refresh { 0% { box-shadow: inset 0 0 0 9999px rgba(47,158,68,.10); } 100% { box-shadow: inset 0 0 0 9999px transparent; } }
  @media (prefers-reduced-motion: reduce) { .ctl-live-dot, .ctl-readout { animation: none; } }
</style>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
<main id="app">…</main>

<script type="module">
import init, { evalLineAsync, hostCall } from './ikigai_web_demo.js?v=__BUILD__';
// The dynamically-loaded XSLT module (urn:xslt:transform). The ~2.4 MB module wasm
// (xrust) is fetched only on the first call — opening the Catalog page — not in the
// host's initial load. The two wasm instances speak the real module-session protocol:
// the host hands the module an encoded `Invoke` (`xsltInvokeSession`), and the module
// pumps each sub-resource it needs back as a `HostCall` to `hostCall` (this kernel),
// which answers with a `HostResult` — a bidirectional byte channel between the instances.
import { xsltInvokeSession } from './xslt-loader.js';
import { jsonldInvokeSession } from './jsonld-loader.js';
// SHACL: self-registers window.shaclValidate; shacl-engine itself loads lazily on first use.
import './shacl-loader.js';
window.hostCall = (replyBytes) => hostCall(replyBytes);
window.xsltInvokeSession = (invokeBytes) => xsltInvokeSession(invokeBytes);
window.jsonldInvokeSession = (invokeBytes) => jsonldInvokeSession(invokeBytes);

// The live terminal: a custom element that self-wires when the composed HTML
// (which contains <ikigai-cli>) is inserted. It drives the same Engine as the page.
class IkigaiCli extends HTMLElement {
  connectedCallback() {
    if (this._wired) return;
    this._wired = true;
    // The terminal itself stays identical to the desktop CLI — just a transcript
    // and an input line, nothing demo-specific inside the terminal chrome.
    this.innerHTML =
      '<div class="cli-transcript"></div>' +
      '<div class="cli-inputline"><span class="cli-prompt">ikigai&gt;</span>' +
      '<input class="cli-input" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="ikigai command"></div>';
    this.transcript = this.querySelector('.cli-transcript');
    this.input = this.querySelector('.cli-input');
    this.history = [];
    this.hpos = 0;
    this.print('Type a request, or `help`.  e.g.  source urn:fn:toUpper hello | urn:fn:toUpper', 'hint');
    this.input.addEventListener('keydown', (e) => this.onKey(e));
    this.addEventListener('click', () => this.input.focus());
    // (The ZeroTrust walkthrough now lives in the runbook's ZeroTrust tab — a
    // urn:runbook:* resource — rather than buttons hardcoded here.)
  }
  // Run a line as if typed: echo it, record history, evaluate, refocus.
  submit(line) {
    this.print('ikigai> ' + line, 'echo');
    if (line.trim()) { this.history.push(line); this.hpos = this.history.length; }
    this.run(line);
    this.input.focus();
  }
  onKey(e) {
    if (e.key === 'Enter') {
      const line = this.input.value;
      this.input.value = '';
      this.submit(line);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (this.hpos > 0) this.input.value = this.history[--this.hpos];
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (this.hpos < this.history.length - 1) this.input.value = this.history[++this.hpos];
      else { this.hpos = this.history.length; this.input.value = ''; }
    }
  }
  async run(line) {
    let r;
    try { r = JSON.parse(await evalLineAsync(line)); }
    catch (err) { this.print('internal error: ' + err, 'error'); return; }
    if (r.kind === 'noop') return;
    if (r.kind === 'clear') { this.transcript.replaceChildren(); return; } // wipe output, keep history
    if (r.kind === 'quit') { this.print('(quit — reload the page to restart)', 'hint'); this.input.disabled = true; return; }
    if (r.text) this.print(r.text, r.kind === 'error' ? 'error' : (r.kind === 'help' ? 'help' : 'out'));
    if (r.cache) this.print(r.cache, 'cache');
  }
  print(text, cls) {
    const pre = document.createElement('pre');
    pre.className = 'cli-line cli-' + cls;
    pre.textContent = text;
    this.transcript.appendChild(pre);
    this.transcript.scrollTop = this.transcript.scrollHeight;
  }
}
customElements.define('ikigai-cli', IkigaiCli);

// `?v=__BUILD__` is rewritten to the commit SHA by pages.yml at deploy time, so each
// deploy fetches a fresh host JS + wasm instead of a 10-min-stale cached copy (the files
// are fixed-name). Locally the placeholder is just a constant query a static server ignores.
await init({ module_or_path: './ikigai_web_demo_bg.wasm?v=__BUILD__' });

// The whole page is one resource: compose it through the Engine and inject the
// result. The composed HTML contains <ikigai-cli>, which self-wires on insertion.
try {
  const app = document.getElementById('app');
  const r = JSON.parse(await evalLineAsync('source urn:fn:compose src=urn:data:page'));
  app.innerHTML = r.kind === 'output' ? r.text : ('compose error: ' + r.text);
  htmx.process(app); // wire the page toolbar's hx-* so inter-page nav works on first load
} catch (e) {
  document.getElementById('app').textContent = 'error: ' + e;
}

// --- Runbook: htmx HATEOAS tabs over the in-page kernel --------------------
// The ONLY glue in the whole runbook. htmx fires a request for `/k/<command>`;
// we cancel the network call and resolve the command through the kernel instead,
// swapping the HTML back. Every tab and step button is pure declarative hx-*
// authored by the urn:runbook:* resource — switching tabs and running steps are
// both just "resolve a resource". (When ikigai is served over HTTP, this adapter
// is replaced by a real server doing the same eval — htmx is unchanged.)
function runKernel(cmd, target, swapStyle) {
  return evalLineAsync(cmd).then((res) => {
    const r = JSON.parse(res);
    // `clear` empties its target (the runbook output pane) — the same engine command
    // the terminal uses to wipe its transcript, here wired to a button.
    if (r.kind === 'clear') { target.textContent = ''; return; }
    if ((swapStyle || 'innerHTML') === 'beforeend') {
      // Append the cache outcome (computed / cached / uncacheable) after the output,
      // so the runbook step shows it inline — no need to switch to the REPL to see it.
      const tag = r.cache ? '   [' + r.cache + ']' : '';
      target.insertAdjacentText('beforeend', r.text + tag + '\n');
    } else {
      target.innerHTML = r.text;
      htmx.process(target); // wire the hx-* on the freshly swapped-in tabs/steps
    }
  });
}
document.body.addEventListener('htmx:beforeRequest', (evt) => {
  const path = evt.detail.requestConfig && evt.detail.requestConfig.path;
  if (!path || path.indexOf('/k/') === -1) return;
  evt.preventDefault(); // resolve locally, not over the network
  const elt = evt.detail.elt;
  const cmd = decodeURIComponent(path.slice(path.indexOf('/k/') + 3));
  runKernel(cmd, evt.detail.target, elt.getAttribute('hx-swap'));
});
// (The runbook now lives on the Demo page — urn:data:demo — and bootstraps itself via
// hx-trigger="load" when that page is opened from the toolbar.)

// --- Passkey identity bridge ----------------------------------------------
// The ONE bit of imperative glue for identity: the WebAuthn ceremony, which only a
// browser API can do (same "one small bridge" shape as the runbook adapter above). The
// affordance, chip and walkthrough are all rendered by urn:runbook:identity (the
// Identity tab) from the session capability. Clicking sign-in runs the ceremony, then
// `sink urn:host:login <scopes>` establishes the session identity as a RESOURCE — the
// same engine command a remote QUIC server's session layer handles — and we re-resolve
// the Identity tab so the page reflects it (HATEOAS — state lives in the representation).
const PK_KEY = 'ikigai:passkey:credId';
const b64urlToBytes = (s) => {
  s = s.replace(/-/g, '+').replace(/_/g, '/');
  const bin = atob(s + '='.repeat((4 - (s.length % 4)) % 4));
  return Uint8Array.from(bin, (c) => c.charCodeAt(0));
};
const bytesToB64url = (buf) =>
  btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
async function clientIdFromRawId(rawId) {
  const digest = await crypto.subtle.digest('SHA-256', rawId);
  return [...new Uint8Array(digest)].map((b) => b.toString(16).padStart(2, '0')).join('').slice(0, 12);
}

// Re-render the Identity tab from the (new) session capability.
const reloadIdentityTab = () =>
  runKernel('source urn:runbook:identity as=text/html', document.getElementById('runbook'), 'innerHTML');

// Serverless WebAuthn: no relying party to verify the assertion, so this is identity
// *selection/derivation*, not authenticated login. The credential's id is stable, so a
// SHA-256 of it gives a stable per-passkey client id that keys the workspace segment.
// The browser is the passkey "minter": it turns the id into the fs scopes and logs in
// via the resource. (A QUIC server's minter would derive scopes from the client cert.)
async function passkeyLogin() {
  const challenge = crypto.getRandomValues(new Uint8Array(32));
  const stored = localStorage.getItem(PK_KEY);
  let rawId;
  if (stored) {
    const assertion = await navigator.credentials.get({ publicKey: {
      challenge, rpId: location.hostname, userVerification: 'preferred',
      allowCredentials: [{ type: 'public-key', id: b64urlToBytes(stored) }],
    } });
    rawId = assertion.rawId;
  } else {
    const cred = await navigator.credentials.create({ publicKey: {
      challenge, rp: { name: 'ikigai', id: location.hostname },
      user: { id: crypto.getRandomValues(new Uint8Array(16)), name: 'ikigai-user', displayName: 'ikigai user' },
      pubKeyCredParams: [{ type: 'public-key', alg: -7 }, { type: 'public-key', alg: -257 }],
      authenticatorSelection: { userVerification: 'preferred' },
    } });
    rawId = cred.rawId;
    localStorage.setItem(PK_KEY, bytesToB64url(rawId));
  }
  const id = (await clientIdFromRawId(rawId)).replace(/[^a-z0-9]/g, '');
  const scopes = `urn:cap:fs:read:ws/${id} urn:cap:fs:write:ws/${id} urn:cap:fs:delete:ws/${id}`;
  await evalLineAsync(`sink urn:host:login ${scopes}`); // login as a resource
  await reloadIdentityTab();
}

document.body.addEventListener('click', async (e) => {
  const link = e.target.closest('#ik-login, #ik-logout');
  if (!link) return;
  e.preventDefault();
  if (link.id === 'ik-login') {
    try { await passkeyLogin(); }
    catch (err) { alert('passkey sign-in failed or was cancelled:\n' + err); }
  } else {
    await evalLineAsync('sink urn:host:logout');
    await reloadIdentityTab();
  }
});
</script>
</body>
</html>
