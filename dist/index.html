<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A page assembled by ikigai</title>
<style>
  html { background: #fff; }
  body { font: 17px/1.7 -apple-system, system-ui, sans-serif; max-width: 860px; margin: 44px auto; padding: 0 22px; color: #1a1a1a; background: #fff; }
  h1 { color: #1f7199; font-size: 28px; margin-bottom: 2px; }
  .sub { color: #555; margin-top: 0; }
  article { border: 1px solid #dfe2e5; border-radius: 10px; padding: 4px 18px 16px; margin: 18px 0; }
  code { color: #7a3e9d; font: 14px ui-monospace, Menlo, monospace; }
  b { background: #eef7ee; border-radius: 4px; padding: 0 4px; font-weight: 600; }
  h3 { font-size: 17px; color: #444; margin-top: 4px; }
  aside.about { border-left: 3px solid #1f7199; background: #f6f9fb; border-radius: 6px; padding: 2px 16px 12px; margin: 16px 0; }
  .literal { color: #555; }
  .literal b { background: none; padding: 0; }
</style>
</head>
<body>
<main id="app">…</main>

<script type="module">
import init, { compose } from './ikigai_web_demo.js';
await init();

// The whole page is one resource. A single compose() call resolves the page
// shape and recursively expands every $a{…} marker through the in-browser
// kernel — no per-slot JavaScript, no fetch, no server.
try {
  document.getElementById('app').innerHTML = await compose('urn:data:page');
} catch (e) {
  document.getElementById('app').textContent = 'compose error: ' + e;
}
</script>
</body>
</html>
