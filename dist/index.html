<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A page assembled by ikigai</title>
<style>
  html { background: #fff; }
  body { font: 17px/1.7 -apple-system, system-ui, sans-serif; max-width: 860px; margin: 44px auto; padding: 0 22px; color: #1a1a1a; background: #fff; }
  h1 { color: #1f7199; font-size: 28px; margin-bottom: 2px; }
  .sub { color: #555; margin-top: 0; }
  article { border: 1px solid #dfe2e5; border-radius: 10px; padding: 4px 18px 16px; margin: 18px 0; }
  code { color: #7a3e9d; font: 14px ui-monospace, Menlo, monospace; }
  b { background: #eef7ee; border-radius: 4px; padding: 0 4px; font-weight: 600; }
  h3 { font-size: 17px; color: #444; margin-top: 4px; }
  aside.about { border-left: 3px solid #1f7199; background: #f6f9fb; border-radius: 6px; padding: 2px 16px 12px; margin: 16px 0; }
  .literal { color: #555; }
  .literal b { background: none; padding: 0; }

  /* The in-page terminal — the CLI Engine running on this page's kernel. */
  .cli-mount { margin-top: 30px; }
  .cli-mount h3 { color: #1f7199; }
  ikigai-cli { display: block; background: #0f1419; border-radius: 10px; padding: 12px 14px; font: 13.5px/1.55 ui-monospace, Menlo, monospace; color: #d7dde3; }
  .cli-transcript { max-height: 320px; overflow-y: auto; }
  .cli-line { margin: 0; white-space: pre-wrap; word-break: break-word; font: inherit; }
  .cli-echo { color: #6cb6ff; }
  .cli-error { color: #ff8a8a; }
  .cli-help { color: #aab2bb; }
  .cli-cache { color: #65727f; font-style: italic; margin-bottom: 7px; }
  .cli-hint { color: #65727f; }
  .cli-inputline { display: flex; align-items: baseline; gap: 7px; margin-top: 5px; border-top: 1px solid #1f2730; padding-top: 8px; }
  .cli-prompt { color: #6cb6ff; }
  .cli-input { flex: 1; background: transparent; border: 0; outline: none; color: #d7dde3; font: inherit; padding: 0; }
  ikigai-cli code { color: #c39be8; }

  /* Interactive runbook — htmx HATEOAS tabs. Every tab/step is a urn:runbook:*
     resource; the markup below is all rendered by that resource, not authored here. */
  #runbook { margin-top: 30px; border: 1px solid #dfe2e5; border-radius: 10px; overflow: hidden; }
  .rb-tabs { display: flex; background: #f3f6f9; border-bottom: 1px solid #dfe2e5; }
  .rb-tab { background: transparent; border: 0; border-bottom: 2px solid transparent; padding: 9px 16px; font: 14px system-ui, sans-serif; color: #1f7199; cursor: pointer; }
  .rb-tab:hover { background: #e7eef3; }
  .rb-tab.selected { background: #fff; border-bottom-color: #1f7199; font-weight: 600; }
  .rb-panel { padding: 14px 18px 18px; }
  .rb-intro { color: #444; }
  .rb-steps { list-style: none; padding: 0; }
  .rb-steps li { margin: 9px 0; }
  .rb-step { background: #f3f6f9; color: #1f7199; border: 1px solid #ccd6dd; border-radius: 6px; padding: 4px 10px; font: 12.5px ui-monospace, Menlo, monospace; cursor: pointer; }
  .rb-step:hover { background: #e7eef3; border-color: #1f7199; }
  .rb-cmd { color: #7a3e9d; font: 12px ui-monospace, Menlo, monospace; margin-left: 8px; }
  .rb-note { color: #777; font-size: 12.5px; margin-left: 8px; }
  .rb-out { background: #0f1419; color: #d7dde3; border-radius: 8px; padding: 10px 12px; margin-top: 12px; min-height: 1.4em; white-space: pre-wrap; font: 13px ui-monospace, Menlo, monospace; }

  /* Passkey identity — the sign-in/out affordance is rendered by urn:host:identity
     (composed into the top of the page); these styles dress it. */
  .ik-id { margin: 0 0 18px; padding: 8px 13px; background: #f6f9fb; border: 1px solid #dfe2e5; border-radius: 8px; font-size: 14px; color: #555; }
  .ik-id-in { background: #eef7ee; border-color: #cfe6cf; }
  .ik-id-link { color: #1f7199; cursor: pointer; text-decoration: none; font-weight: 600; }
  .ik-id-link:hover { text-decoration: underline; }
  .ik-id-hint { color: #888; font-size: 13px; }
  .ik-try { margin: -8px 0 18px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .ik-try .ik-try-label { color: #777; font-size: 13px; }
  .ik-try button { background: #f3f6f9; color: #1f7199; border: 1px solid #ccd6dd; border-radius: 6px; padding: 4px 10px; font: 12.5px ui-monospace, Menlo, monospace; cursor: pointer; }
  .ik-try button:hover { background: #e7eef3; border-color: #1f7199; }
</style>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
<main id="app">…</main>

<section id="runbook" aria-label="ikigai runbook">loading runbook…</section>

<script type="module">
import init, { evalLineAsync, login, logout } from './ikigai_web_demo.js';

// The live terminal: a custom element that self-wires when the composed HTML
// (which contains <ikigai-cli>) is inserted. It drives the same Engine as the page.
class IkigaiCli extends HTMLElement {
  connectedCallback() {
    if (this._wired) return;
    this._wired = true;
    // The terminal itself stays identical to the desktop CLI — just a transcript
    // and an input line, nothing demo-specific inside the terminal chrome.
    this.innerHTML =
      '<div class="cli-transcript"></div>' +
      '<div class="cli-inputline"><span class="cli-prompt">ikigai&gt;</span>' +
      '<input class="cli-input" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="ikigai command"></div>';
    this.transcript = this.querySelector('.cli-transcript');
    this.input = this.querySelector('.cli-input');
    this.history = [];
    this.hpos = 0;
    this.print('Type a request, or `help`.  e.g.  source urn:fn:toUpper hello | urn:fn:toUpper', 'hint');
    this.input.addEventListener('keydown', (e) => this.onKey(e));
    this.addEventListener('click', () => this.input.focus());
    // (The ZeroTrust walkthrough now lives in the runbook's ZeroTrust tab — a
    // urn:runbook:* resource — rather than buttons hardcoded here.)
  }
  // Run a line as if typed: echo it, record history, evaluate, refocus.
  submit(line) {
    this.print('ikigai> ' + line, 'echo');
    if (line.trim()) { this.history.push(line); this.hpos = this.history.length; }
    this.run(line);
    this.input.focus();
  }
  onKey(e) {
    if (e.key === 'Enter') {
      const line = this.input.value;
      this.input.value = '';
      this.submit(line);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (this.hpos > 0) this.input.value = this.history[--this.hpos];
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (this.hpos < this.history.length - 1) this.input.value = this.history[++this.hpos];
      else { this.hpos = this.history.length; this.input.value = ''; }
    }
  }
  async run(line) {
    let r;
    try { r = JSON.parse(await evalLineAsync(line)); }
    catch (err) { this.print('internal error: ' + err, 'error'); return; }
    if (r.kind === 'noop') return;
    if (r.kind === 'clear') { this.transcript.replaceChildren(); return; } // wipe output, keep history
    if (r.kind === 'quit') { this.print('(quit — reload the page to restart)', 'hint'); this.input.disabled = true; return; }
    if (r.text) this.print(r.text, r.kind === 'error' ? 'error' : (r.kind === 'help' ? 'help' : 'out'));
    if (r.cache) this.print(r.cache, 'cache');
  }
  print(text, cls) {
    const pre = document.createElement('pre');
    pre.className = 'cli-line cli-' + cls;
    pre.textContent = text;
    this.transcript.appendChild(pre);
    this.transcript.scrollTop = this.transcript.scrollHeight;
  }
}
customElements.define('ikigai-cli', IkigaiCli);

await init();

// The whole page is one resource: compose it through the Engine and inject the
// result. The composed HTML contains <ikigai-cli>, which self-wires on insertion.
try {
  const r = JSON.parse(await evalLineAsync('source urn:fn:compose src=urn:data:page'));
  document.getElementById('app').innerHTML = r.kind === 'output' ? r.text : ('compose error: ' + r.text);
} catch (e) {
  document.getElementById('app').textContent = 'error: ' + e;
}

// --- Runbook: htmx HATEOAS tabs over the in-page kernel --------------------
// The ONLY glue in the whole runbook. htmx fires a request for `/k/<command>`;
// we cancel the network call and resolve the command through the kernel instead,
// swapping the HTML back. Every tab and step button is pure declarative hx-*
// authored by the urn:runbook:* resource — switching tabs and running steps are
// both just "resolve a resource". (When ikigai is served over HTTP, this adapter
// is replaced by a real server doing the same eval — htmx is unchanged.)
function runKernel(cmd, target, swapStyle) {
  return evalLineAsync(cmd).then((res) => {
    const r = JSON.parse(res);
    if ((swapStyle || 'innerHTML') === 'beforeend') {
      target.insertAdjacentText('beforeend', r.text + '\n');
    } else {
      target.innerHTML = r.text;
      htmx.process(target); // wire the hx-* on the freshly swapped-in tabs/steps
    }
  });
}
document.body.addEventListener('htmx:beforeRequest', (evt) => {
  const path = evt.detail.requestConfig && evt.detail.requestConfig.path;
  if (!path || path.indexOf('/k/') === -1) return;
  evt.preventDefault(); // resolve locally, not over the network
  const elt = evt.detail.elt;
  const cmd = decodeURIComponent(path.slice(path.indexOf('/k/') + 3));
  runKernel(cmd, evt.detail.target, elt.getAttribute('hx-swap'));
});
// Bootstrap the first tab now the kernel is ready.
runKernel('source urn:runbook:basics as=text/html', document.getElementById('runbook'), 'innerHTML');

// --- Passkey identity bridge ----------------------------------------------
// The ONE bit of imperative glue for identity (the WebAuthn ceremony, which only a
// browser API can do — the same "one small bridge" shape as the runbook adapter
// above). The affordance itself is the urn:host:identity resource composed at the top
// of the page; clicking its links runs the passkey ceremony, mints a per-client
// capability via the wasm `login`, then re-resolves urn:host:identity so the page
// reflects the new identity (HATEOAS — state lives in the representation).
const PK_KEY = 'ikigai:passkey:credId';
const b64urlToBytes = (s) => {
  s = s.replace(/-/g, '+').replace(/_/g, '/');
  const bin = atob(s + '='.repeat((4 - (s.length % 4)) % 4));
  return Uint8Array.from(bin, (c) => c.charCodeAt(0));
};
const bytesToB64url = (buf) =>
  btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
async function clientIdFromRawId(rawId) {
  const digest = await crypto.subtle.digest('SHA-256', rawId);
  return [...new Uint8Array(digest)].map((b) => b.toString(16).padStart(2, '0')).join('').slice(0, 12);
}

// Serverless WebAuthn: no relying party to verify the assertion, so this is identity
// *selection/derivation*, not authenticated login. The credential's id is stable, so a
// SHA-256 of it gives a stable per-passkey client id that keys the workspace segment.
async function passkeyLogin() {
  const challenge = crypto.getRandomValues(new Uint8Array(32));
  const stored = localStorage.getItem(PK_KEY);
  let rawId;
  if (stored) {
    const assertion = await navigator.credentials.get({ publicKey: {
      challenge, rpId: location.hostname, userVerification: 'preferred',
      allowCredentials: [{ type: 'public-key', id: b64urlToBytes(stored) }],
    } });
    rawId = assertion.rawId;
  } else {
    const cred = await navigator.credentials.create({ publicKey: {
      challenge, rp: { name: 'ikigai', id: location.hostname },
      user: { id: crypto.getRandomValues(new Uint8Array(16)), name: 'ikigai-user', displayName: 'ikigai user' },
      pubKeyCredParams: [{ type: 'public-key', alg: -7 }, { type: 'public-key', alg: -257 }],
      authenticatorSelection: { userVerification: 'preferred' },
    } });
    rawId = cred.rawId;
    localStorage.setItem(PK_KEY, bytesToB64url(rawId));
  }
  const ws = login(await clientIdFromRawId(rawId)); // wasm: scope the session to ws/<id>
  await refreshIdentity(ws);
}

// Re-resolve the affordance and reflect it in the page; render the "try it" boundary
// demo when signed in (`ws` is the workspace label, or null when anonymous).
async function refreshIdentity(ws) {
  const r = JSON.parse(await evalLineAsync('source urn:host:identity'));
  const nav = document.querySelector('#app .ik-id');
  if (nav && r.kind === 'output') nav.outerHTML = r.text;
  renderTry(ws);
}

// A minimal walkthrough proving the segment boundary with a single passkey: write and
// read under ws/<id>, then watch a write *outside* your segment get refused — your
// capability grants only your own segment. (Buttons run through the live terminal.)
function renderTry(ws) {
  const old = document.getElementById('ik-try');
  if (old) old.remove();
  if (!ws) return;
  const id = ws.slice(3); // "ws/<id>" → "<id>"
  const panel = document.createElement('div');
  panel.id = 'ik-try';
  panel.className = 'ik-try';
  panel.innerHTML = '<span class="ik-try-label">try your segment:</span>';
  const steps = [
    ['write a private note', `sink urn:file:${id}/secret.txt mine only`],
    ['read it back', `source urn:file:${id}/secret.txt`],
    ['write outside it → denied', `sink urn:file:someone-else/secret.txt nope`],
  ];
  for (const [label, cmd] of steps) {
    const b = document.createElement('button');
    b.textContent = label;
    b.title = cmd;
    b.addEventListener('click', () => {
      const cli = document.querySelector('ikigai-cli');
      if (cli) { cli.submit(cmd); cli.scrollIntoView({ block: 'nearest' }); }
    });
    panel.appendChild(b);
  }
  document.querySelector('#app .ik-id').after(panel);
}

document.body.addEventListener('click', async (e) => {
  const link = e.target.closest('#ik-login, #ik-logout');
  if (!link) return;
  e.preventDefault();
  if (link.id === 'ik-login') {
    try { await passkeyLogin(); }
    catch (err) { alert('passkey sign-in failed or was cancelled:\n' + err); }
  } else {
    logout();
    await refreshIdentity(null);
  }
});
</script>
</body>
</html>
