name: Deploy demo to GitHub Pages

# Rebuild and redeploy the WASM demo whenever it changes. (To pick up a new
# release of an upstream ikigai crate, bump its version in Cargo.toml and push —
# that's a change here, so it redeploys.) Also runnable on demand.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Let Pages read the deployment token; one deploy at a time.
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      # Prebuilt wasm-bindgen-cli, pinned to the version in Cargo.toml.
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.108

      # Rebuild the HOST wasm from the published crates and emit its JS bindings into
      # dist/. (--lib only: the native WebTransport server bin isn't part of the wasm
      # build.)
      - name: Build host WASM + JS bindings into dist/
        run: |
          cargo build --release --lib --target wasm32-unknown-unknown
          wasm-bindgen --target web --out-dir dist \
            target/wasm32-unknown-unknown/release/ikigai_web_demo.wasm

      # Build the lazy-loaded XSLT module wasm from the ikigai-xslt repo itself, with its
      # `module` feature (which emits the module glue via ikigai_module::wasm_module!) — so
      # xrust never enters the host's wasm; the host imports it lazily through the committed
      # dist/xslt-loader.js glue. Only the generated .js/.wasm are CI-built. Uses the same
      # wasm32 toolchain + wasm-bindgen-cli@0.2.108 installed above. (ikigai-xslt is its own
      # module now — there is no separate ikigai-xslt-module crate.)
      - name: Build XSLT module WASM + JS bindings into dist/
        run: |
          git clone --depth 1 https://github.com/ikigai-rs/ikigai-xslt.git module-src
          cargo build --release --lib --features module \
            --manifest-path module-src/Cargo.toml --target wasm32-unknown-unknown
          wasm-bindgen --target web --out-dir dist \
            module-src/target/wasm32-unknown-unknown/release/ikigai_xslt.wasm

      # The JSON-LD operator module (urn:jsonld:*), built from its own repo with the `module`
      # feature, lazy-loaded via the committed dist/jsonld-loader.js — the heavy json-ld tree
      # kept out of the host wasm, exactly like XSLT.
      - name: Build JSON-LD module WASM + JS bindings into dist/
        run: |
          git clone --depth 1 https://github.com/ikigai-rs/ikigai-jsonld.git jsonld-src
          cargo build --release --lib --features module \
            --manifest-path jsonld-src/Cargo.toml --target wasm32-unknown-unknown
          wasm-bindgen --target web --out-dir dist \
            jsonld-src/target/wasm32-unknown-unknown/release/ikigai_jsonld.wasm

      # Cache-bust the fixed-name host JS + wasm: rewrite the ?v=__BUILD__ placeholder in
      # index.html to this commit's SHA, so every deploy fetches fresh assets instead of a
      # (max-age=600) stale cached copy. The placeholder is harmless locally (a static
      # server ignores the query).
      - name: Stamp cache-busting build id
        run: sed -i "s/__BUILD__/${GITHUB_SHA}/g" dist/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
