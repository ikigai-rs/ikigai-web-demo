name: Deploy demo to GitHub Pages

# Rebuild and redeploy the WASM demo whenever it changes. (To pick up a new
# release of an upstream ikigai crate, bump its version in Cargo.toml and push —
# that's a change here, so it redeploys.) Also runnable on demand.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Let Pages read the deployment token; one deploy at a time.
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # TEMPORARY: deploy the pre-built dist/ committed to the repo (host wasm + the
      # lazy-loaded ikigai-xslt-module wasm + xslt-loader.js), rather than rebuilding on
      # CI. The dynamic module is a separate build, and the upstream crates aren't on
      # crates.io yet — so for now the demo is built locally and committed. Restore the
      # cargo build + wasm-bindgen steps (and build the module too) once the crates
      # publish.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
